name: Build EDD Compta

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Tauri CLI
        run: npm install
        working-directory: .

      - name: Build (Windows)
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload installer (.msi)
        uses: actions/upload-artifact@v4
        with:
          name: EDD-Compta-Windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload installer (.exe NSIS)
        uses: actions/upload-artifact@v4
        with:
          name: EDD-Compta-Windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: npm install

      - name: Build (Linux)
        run: npx tauri build

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: EDD-Compta-Linux-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
