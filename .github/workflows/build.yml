name: Build EDD Compta

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Tauri CLI
        run: npm install
        working-directory: .

      - name: Build (Windows)
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload installer (.msi)
        uses: actions/upload-artifact@v4
        with:
          name: EDD-Compta-Windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload installer (.exe NSIS)
        uses: actions/upload-artifact@v4
        with:
          name: EDD-Compta-Windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: npm install

      - name: Build (Linux)
        run: npx tauri build

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: EDD-Compta-Linux-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: EDD Compta ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          body: |
            ## EDD Compta — application de comptabilité ASBL

            Comptabilité en partie double pour ASBL belge (plan PCMN),
            100 % hors ligne. Les données sont enregistrées dans un fichier
            local (`AppData\Roaming\EDD-Compta\compta.json` sous Windows) —
            elles ne sont **jamais perdues** en vidant le cache du navigateur.

            ### Installation Windows
            1. Téléchargez **`EDD.Compta_*_x64-setup.exe`** ci-dessous.
            2. Double-cliquez. Si Windows affiche « Windows a protégé votre
               ordinateur » : **Informations complémentaires → Exécuter quand même**
               (normal pour un programme non signé).
            3. Lancez « EDD Compta » depuis le menu Démarrer.

            > ⚠ Si vous activez un mot de passe, il est **irrécupérable** s'il est
            > oublié. Faites régulièrement une sauvegarde JSON (Paramètres) et
            > conservez-la en lieu sûr.

            ### Fichiers
            - `*_x64-setup.exe` — installateur Windows (recommandé)
            - `*_x64_en-US.msi` — installateur Windows (format MSI)
            - `*_amd64.AppImage` — version Linux
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.AppImage
